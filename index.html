<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>XEVIOUS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100dvh; overflow:hidden; touch-action:none; }
canvas { display:block; image-rendering:pixelated; }
#pad { display:none; width:100%; max-width:400px; padding:6px 10px; justify-content:space-between; align-items:center; }
#pad.show { display:flex; }
.dpad { display:grid; grid-template-columns:repeat(3,48px); grid-template-rows:repeat(3,48px); gap:3px; }
.dpad button { background:rgba(255,255,255,0.12); border:1.5px solid rgba(255,255,255,0.25); border-radius:8px; color:#fff; font-size:18px; cursor:pointer; -webkit-user-select:none; user-select:none; touch-action:none; }
.dpad .empty { background:transparent; border:none; pointer-events:none; }
.dpad button.active { background:rgba(255,255,255,0.38); }
.btns { display:flex; flex-direction:column; gap:10px; }
.btn { width:66px; height:66px; border-radius:50%; border:2px solid rgba(255,255,255,0.35); font-size:11px; font-weight:bold; color:#fff; cursor:pointer; -webkit-user-select:none; user-select:none; touch-action:none; line-height:1.3; }
.btn-z { background:rgba(80,180,255,0.28); }
.btn-x { background:rgba(255,180,40,0.28); }
.btn.active { opacity:0.55; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="pad">
  <div class="dpad">
    <button class="empty"></button><button id="du">▲</button><button class="empty"></button>
    <button id="dl">◀</button><button class="empty"></button><button id="dr">▶</button>
    <button class="empty"></button><button id="dd">▼</button><button class="empty"></button>
  </div>
  <div class="btns">
    <button class="btn btn-z" id="bz">ZAPPER<br>Z</button>
    <button class="btn btn-x" id="bx">BLAST<br>X</button>
  </div>
</div>
<script>
// ── canvas setup ─────────────────────────────────────────────────────────────
const W=360, H=480;
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
cv.width=W; cv.height=H;
function resize(){
  const vw=innerWidth, vh=innerHeight;
  const mob=/Mobi|iPhone|iPad|Android/i.test(navigator.userAgent)||vw<600;
  const ph=mob?130:0, avh=vh-ph;
  const sc=Math.min(vw/W, avh/H);
  cv.style.width=(W*sc)+'px'; cv.style.height=(H*sc)+'px';
  const pad=document.getElementById('pad');
  if(mob){ pad.classList.add('show'); pad.style.maxWidth=(W*sc)+'px'; }
}
resize(); addEventListener('resize',resize);

// ── audio ─────────────────────────────────────────────────────────────────────
const AC=new AudioContext();
function tone(f,d,v=0.15,t='square'){
  if(AC.state==='suspended') return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=t; o.frequency.value=f;
  g.gain.setValueAtTime(v,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
  o.start(); o.stop(AC.currentTime+d);
}
const sfxShoot=()=>tone(900,0.05,0.1);
const sfxBlast=()=>tone(200,0.12,0.14,'triangle');
const sfxExpl=(big)=>{
  const ns=big?[110,75,50,35]:[190,130,90];
  ns.forEach((f,i)=>setTimeout(()=>tone(f,0.14,0.2,'sawtooth'),i*55));
};

// ── state ─────────────────────────────────────────────────────────────────────
let gs='title', score=0, hi=0, lives=3, frame=0, shake=0;

// ── terrain ───────────────────────────────────────────────────────────────────
const ROW_H=8, ROWS=90, TOTAL_H=ROW_H*ROWS, SPD=1.0;
let terrainY=0;
const tRows=[];
function mkTerrain(){
  tRows.length=0;
  for(let i=0;i<ROWS;i++){
    const v=Math.sin(i*0.41)*Math.cos(i*0.17)*0.5+0.5;
    if(v<0.10) tRows.push({t:'river', x:15+(i*53%180), w:50+(i*31%80)});
    else if(v<0.18) tRows.push({t:'road',  x:25+(i*71%200), w:22+(i*19%28)});
    else if(v<0.38) tRows.push({t:'forest',shade: 22+(i%3)*6});
    else            tRows.push({t:'grass', shade: 30+(i%5)*4});
  }
}
function drawTerrain(){
  ctx.fillStyle='#0f200a'; ctx.fillRect(0,0,W,H);
  const off=terrainY%TOTAL_H;
  const i0=Math.floor((-off)/ROW_H)-1;
  const i1=Math.ceil((H-off)/ROW_H)+1;
  for(let i=i0;i<=i1;i++){
    const y=i*ROW_H+off;
    if(y>H+ROW_H||y<-ROW_H) continue;
    const row=tRows[((i%ROWS)+ROWS)%ROWS];
    if(row.t==='grass'){
      ctx.fillStyle=`rgb(${row.shade},${52+row.shade},${row.shade-10})`;
      ctx.fillRect(0,y,W,ROW_H+1);
    } else if(row.t==='forest'){
      ctx.fillStyle=`rgb(${row.shade},${row.shade+24},${row.shade-8})`;
      ctx.fillRect(0,y,W,ROW_H+1);
      // tree dots
      ctx.fillStyle=`rgba(0,0,0,0.22)`;
      for(let x=4;x<W;x+=16) ctx.fillRect(x,y+1,8,ROW_H-2);
    } else if(row.t==='river'){
      ctx.fillStyle='#12346a'; ctx.fillRect(0,y,W,ROW_H+1);
      ctx.fillStyle='#1a4a8a'; ctx.fillRect(row.x,y,row.w,ROW_H+1);
      ctx.fillStyle='rgba(100,180,255,0.18)'; ctx.fillRect(row.x+4,y+2,row.w-8,2);
    } else { // road
      ctx.fillStyle='#1a1208'; ctx.fillRect(0,y,W,ROW_H+1);
      ctx.fillStyle='#3a2a18'; ctx.fillRect(row.x,y,row.w,ROW_H+1);
    }
  }
  // subtle vertical grid
  ctx.strokeStyle='rgba(0,60,0,0.13)'; ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=20){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
}

// ── player ────────────────────────────────────────────────────────────────────
const P={x:W/2,y:H-80,w:22,h:18,spd:3.5,inv:0};
let zappers=[], blasts=[], aim={x:W/2,y:H-150};

// ── enemies / ground ──────────────────────────────────────────────────────────
let airs=[], grounds=[], ebullets=[], particles=[], popups=[];
let eTimer=70, gTimer=100;
const FMTS=[
  (cx,cy)=>[{x:cx,y:cy},{x:cx-26,y:cy+16},{x:cx+26,y:cy+16},{x:cx-52,y:cy+32},{x:cx+52,y:cy+32}],
  (cx,cy)=>[-48,-24,0,24,48].map(dx=>({x:cx+dx,y:cy})),
  (cx,cy)=>[{x:cx,y:cy},{x:cx-28,y:cy+18},{x:cx+28,y:cy+18},{x:cx,y:cy+36}],
];
function spawnAir(){
  const r=Math.random();
  if(r<0.5){
    const fm=FMTS[frame%FMTS.length], cx=60+Math.random()*(W-120);
    fm(cx,-22).forEach(p=>airs.push({x:p.x,y:p.y,vx:(Math.random()-0.5)*1.5,vy:1.2+Math.random()*0.6,type:'small',hp:1,w:14,h:10,st:80+Math.random()*120}));
  } else if(r<0.82){
    airs.push({x:60+Math.random()*(W-120),y:-32,vx:(Math.random()-0.5),vy:0.9,type:'mid',hp:4,w:24,h:18,st:60+Math.random()*70,ph:0});
  } else {
    airs.push({x:W/2,y:-55,vx:0.9,vy:0.45,type:'boss',hp:22,w:42,h:34,st:35,ph:0});
  }
}
function spawnGround(){
  if(Math.random()<0.6)
    grounds.push({x:30+Math.random()*(W-60),y:-20,type:'turret',hp:3,st:85+Math.random()*55,w:14,h:14});
  else
    grounds.push({x:30+Math.random()*(W-60),y:-20,type:'armor',hp:7,w:22,h:16});
}

// ── input ─────────────────────────────────────────────────────────────────────
const K={};
addEventListener('keydown',e=>{
  K[e.code]=true;
  if(gs==='title'||gs==='over') goPlay();
  if(gs==='play'){
    if((e.code==='Space'||e.code==='KeyZ')&&zappers.length<3){zappers.push({x:P.x,y:P.y-10});sfxShoot();}
    if(e.code==='KeyX'){blasts.push({x:aim.x,y:aim.y,r:0});sfxBlast();}
  }
  e.preventDefault();
});
addEventListener('keyup',e=>{K[e.code]=false;});

function pBind(id,code){
  const el=document.getElementById(id); if(!el) return;
  el.addEventListener('pointerdown',e=>{
    e.preventDefault(); el.setPointerCapture(e.pointerId);
    K[code]=true; el.classList.add('active');
    if(gs==='title'||gs==='over') goPlay();
  });
  const up=e=>{K[code]=false; el.classList.remove('active');};
  el.addEventListener('pointerup',up); el.addEventListener('pointercancel',up);
}
pBind('du','ArrowUp'); pBind('dd','ArrowDown'); pBind('dl','ArrowLeft'); pBind('dr','ArrowRight');
function aBind(id,fn){
  const el=document.getElementById(id); if(!el) return;
  el.addEventListener('pointerdown',e=>{
    e.preventDefault(); el.setPointerCapture(e.pointerId); el.classList.add('active');
    if(AC.state==='suspended') AC.resume();
    if(gs==='title'||gs==='over'){goPlay();return;} fn();
  });
  const up=e=>el.classList.remove('active');
  el.addEventListener('pointerup',up); el.addEventListener('pointercancel',up);
}
aBind('bz',()=>{if(zappers.length<3){zappers.push({x:P.x,y:P.y-10});sfxShoot();}});
aBind('bx',()=>{blasts.push({x:aim.x,y:aim.y,r:0});sfxBlast();});
cv.addEventListener('touchstart',e=>{e.preventDefault();if(AC.state==='suspended')AC.resume();if(gs==='title'||gs==='over')goPlay();},{passive:false});

// ── game lifecycle ────────────────────────────────────────────────────────────
function goPlay(){
  gs='play'; score=0; lives=3; frame=0;
  P.x=W/2; P.y=H-80; P.inv=0;
  zappers.length=blasts.length=airs.length=grounds.length=0;
  ebullets.length=particles.length=popups.length=0;
  eTimer=70; gTimer=100;
  mkTerrain(); if(AC.state==='suspended') AC.resume();
}

// ── collision ─────────────────────────────────────────────────────────────────
const hRect=(a,b)=>Math.abs(a.x-b.x)<(a.w+b.w)/2&&Math.abs(a.y-b.y)<(a.h+b.h)/2;
const hCirc=(cx,cy,cr,b)=>Math.abs(cx-b.x)<cr+b.w/2&&Math.abs(cy-b.y)<cr+b.h/2;

// ── particles ─────────────────────────────────────────────────────────────────
function expl(x,y,big=false){
  const n=big?18:9;
  const cols=big?['#ff8800','#ffcc00','#ff3300','#ffffff','#ffaa44']:['#ff8800','#ffdd00','#ffffff'];
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2+Math.random()*0.5;
    const spd=(big?2.5:1.5)+Math.random()*(big?3:2);
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      life:1,dec:0.035+Math.random()*0.04,r:big?3+Math.random()*3:2+Math.random()*2,
      col:cols[i%cols.length]});
  }
  if(big) shake=8;
  sfxExpl(big);
}
function addPopup(x,y,txt,col='#ffcc00'){
  popups.push({x,y,txt,col,life:1,dec:0.025});
}
function pDie(){
  expl(P.x,P.y,true); lives--;
  if(lives<=0){gs='over';if(score>hi)hi=score;return;}
  P.x=W/2; P.y=H-80; P.inv=200;
}

// ── draw sprites ──────────────────────────────────────────────────────────────
function glow(col,blur=8){ctx.shadowColor=col;ctx.shadowBlur=blur;}
function noGlow(){ctx.shadowColor='transparent';ctx.shadowBlur=0;}

function drawShip(x,y,al=1){
  ctx.save(); ctx.globalAlpha=al; ctx.translate(x,y);
  // engine glow
  glow('#00aaff',14);
  ctx.fillStyle='rgba(0,150,255,0.4)';
  ctx.beginPath(); ctx.ellipse(0,10,5,3,0,0,Math.PI*2); ctx.fill();
  noGlow();
  // wing left
  const wg=ctx.createLinearGradient(-20,0,0,0);
  wg.addColorStop(0,'#2244aa'); wg.addColorStop(1,'#6699cc');
  ctx.fillStyle=wg;
  ctx.beginPath(); ctx.moveTo(-8,2); ctx.lineTo(-22,9); ctx.lineTo(-12,9); ctx.closePath(); ctx.fill();
  // wing right
  const wgr=ctx.createLinearGradient(20,0,0,0);
  wgr.addColorStop(0,'#2244aa'); wgr.addColorStop(1,'#6699cc');
  ctx.fillStyle=wgr;
  ctx.beginPath(); ctx.moveTo(8,2); ctx.lineTo(22,9); ctx.lineTo(12,9); ctx.closePath(); ctx.fill();
  // body
  const bg=ctx.createLinearGradient(-6,-10,6,9);
  bg.addColorStop(0,'#aaddff'); bg.addColorStop(0.5,'#6699cc'); bg.addColorStop(1,'#334488');
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.moveTo(0,-11); ctx.lineTo(-9,2); ctx.lineTo(-13,9); ctx.lineTo(13,9); ctx.lineTo(9,2); ctx.closePath(); ctx.fill();
  // cockpit
  glow('#ffff88',6);
  ctx.fillStyle='#ffffaa';
  ctx.beginPath(); ctx.ellipse(0,-1,4,5,0,0,Math.PI*2); ctx.fill();
  noGlow();
  ctx.restore();
}

function drawSmall(x,y){
  ctx.save(); ctx.translate(x,y);
  glow('#ff6600',6);
  ctx.fillStyle='#ff6622';
  ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(-8,6); ctx.lineTo(8,6); ctx.closePath(); ctx.fill();
  noGlow();
  ctx.fillStyle='#ffaa00'; ctx.fillRect(-3,-2,6,4);
  ctx.restore();
}
function drawMid(x,y,ph){
  ctx.save(); ctx.translate(x,y);
  glow('#44ff44',6);
  ctx.fillStyle='#55cc33';
  ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(-13,10); ctx.lineTo(13,10); ctx.closePath(); ctx.fill();
  noGlow();
  ctx.fillStyle='#88ff44';
  ctx.beginPath(); ctx.ellipse(0,0,7,5,0,0,Math.PI*2); ctx.fill();
  const o=Math.sin(ph)*3;
  ctx.fillStyle='#aaff66'; ctx.fillRect(-16,-2+o,5,4); ctx.fillRect(11,-2-o,5,4);
  ctx.restore();
}
function drawBoss(x,y,ph){
  ctx.save(); ctx.translate(x,y);
  glow('#ff44ff',12);
  ctx.fillStyle='#cc22cc';
  ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(-22,18); ctx.lineTo(22,18); ctx.closePath(); ctx.fill();
  noGlow();
  glow('#ff88ff',8);
  ctx.fillStyle='#ee44ee';
  ctx.beginPath(); ctx.ellipse(0,0,13,9,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffaaff';
  for(let i=0;i<3;i++){
    const a=ph+i*Math.PI*2/3;
    glow('#ff88ff',6);
    ctx.beginPath(); ctx.arc(Math.cos(a)*14,Math.sin(a)*14,5,0,Math.PI*2); ctx.fill();
  }
  noGlow();
  ctx.restore();
}
function drawTurret(x,y){
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='#555'; ctx.fillRect(-7,-4,14,8);
  ctx.fillStyle='#999'; ctx.fillRect(-5,-8,10,8);
  glow('#ff0000',4); ctx.fillStyle='#ff2222'; ctx.fillRect(-2,-11,4,4);
  noGlow(); ctx.restore();
}
function drawArmor(x,y){
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='#443322'; ctx.fillRect(-12,-8,24,16);
  ctx.fillStyle='#665544'; ctx.fillRect(-9,-5,18,10);
  ctx.fillStyle='#887766'; ctx.fillRect(-5,-3,10,6);
  ctx.strokeStyle='#221100'; ctx.lineWidth=1; ctx.strokeRect(-12,-8,24,16);
  ctx.restore();
}

// ── update ────────────────────────────────────────────────────────────────────
function update(){
  frame++;
  terrainY+=SPD;
  if(shake>0) shake*=0.7;

  if(K['ArrowLeft']||K['KeyA']) P.x-=P.spd;
  if(K['ArrowRight']||K['KeyD']) P.x+=P.spd;
  if(K['ArrowUp']||K['KeyW']) P.y-=P.spd;
  if(K['ArrowDown']||K['KeyS']) P.y+=P.spd;
  P.x=Math.max(14,Math.min(W-14,P.x));
  P.y=Math.max(18,Math.min(H-18,P.y));
  if(P.inv>0) P.inv--;

  aim.x+=(P.x-aim.x)*0.1;
  aim.y+=((P.y-80)-aim.y)*0.1;
  aim.x=Math.max(8,Math.min(W-8,aim.x));
  aim.y=Math.max(8,Math.min(H-8,aim.y));

  // auto fire on hold
  if((K['KeyZ']||K['Space'])&&frame%12===0&&zappers.length<3){zappers.push({x:P.x,y:P.y-10});sfxShoot();}

  zappers=zappers.filter(z=>{z.y-=9;return z.y>-12;});
  blasts=blasts.filter(b=>{b.r+=2.8;return b.r<24;});

  if(--eTimer<=0){spawnAir();eTimer=Math.max(38,70-Math.floor(frame/250));}
  if(--gTimer<=0){spawnGround();gTimer=95+Math.floor(Math.random()*70);}

  airs=airs.filter(e=>{
    e.x+=e.vx; e.y+=e.vy;
    if(e.type==='mid'){e.vx=Math.sin(e.ph)*1.8;e.ph+=0.03;}
    if(e.type==='boss'){e.ph+=0.04;if(e.x<30||e.x>W-30)e.vx*=-1;if(e.y>90)e.vy=0;}
    if(--e.st<=0){
      e.st=e.type==='boss'?28:e.type==='mid'?65:130;
      const dx=P.x-e.x,dy=P.y-e.y,len=Math.hypot(dx,dy)||1,spd=e.type==='boss'?3.2:2.1;
      ebullets.push({x:e.x,y:e.y,vx:dx/len*spd,vy:dy/len*spd});
    }
    for(let i=zappers.length-1;i>=0;i--){
      if(hRect({x:zappers[i].x,y:zappers[i].y,w:4,h:4},e)){
        zappers.splice(i,1); e.hp--;
        if(e.hp<=0){
          const pts=e.type==='boss'?1000:e.type==='mid'?200:50;
          expl(e.x,e.y,e.type!=='small'); score+=pts; addPopup(e.x,e.y-10,'+'+pts); return false;
        }
      }
    }
    return e.y<H+44;
  });

  grounds=grounds.filter(g=>{
    g.y+=SPD;
    if(g.type==='turret'&&--g.st<=0){
      g.st=85+Math.random()*55;
      const dx=P.x-g.x,dy=P.y-g.y,len=Math.hypot(dx,dy)||1;
      ebullets.push({x:g.x,y:g.y,vx:dx/len*1.9,vy:dy/len*1.9});
    }
    for(let i=blasts.length-1;i>=0;i--){
      if(hCirc(blasts[i].x,blasts[i].y,blasts[i].r,g)){
        g.hp--;
        if(g.hp<=0){
          const pts=g.type==='armor'?300:100;
          expl(g.x,g.y,true); score+=pts; addPopup(g.x,g.y-10,'+'+pts); return false;
        }
      }
    }
    return g.y<H+22;
  });

  ebullets=ebullets.filter(b=>{
    b.x+=b.vx; b.y+=b.vy;
    if(P.inv===0&&hRect({x:b.x,y:b.y,w:5,h:5},{x:P.x,y:P.y,w:14,h:12})){pDie();return false;}
    return b.x>-6&&b.x<W+6&&b.y>-6&&b.y<H+6;
  });

  if(P.inv===0) for(const e of airs) if(hRect({x:P.x,y:P.y,w:12,h:10},e)){pDie();break;}

  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.life-=p.dec;return p.life>0;});
  popups=popups.filter(p=>{p.y-=0.6;p.life-=p.dec;return p.life>0;});
}

// ── draw ──────────────────────────────────────────────────────────────────────
function drawGame(){
  ctx.save();
  if(shake>0.5){ ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); }

  drawTerrain();

  for(const g of grounds){ if(g.type==='turret')drawTurret(g.x,g.y);else drawArmor(g.x,g.y); }

  // blaster aim
  ctx.strokeStyle='rgba(255,210,0,0.75)'; ctx.lineWidth=1.5;
  glow('#ffcc00',5);
  ctx.beginPath(); ctx.arc(aim.x,aim.y,9,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(aim.x-14,aim.y); ctx.lineTo(aim.x+14,aim.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(aim.x,aim.y-14); ctx.lineTo(aim.x,aim.y+14); ctx.stroke();
  noGlow();

  for(const b of blasts){
    const al=1-b.r/24;
    glow('#ffcc00',8); ctx.strokeStyle=`rgba(255,200,0,${al})`; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle=`rgba(255,140,0,${al*0.5})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.55,0,Math.PI*2); ctx.stroke();
    noGlow();
  }

  for(const z of zappers){
    glow('#aaeeff',8); ctx.fillStyle='#ddeeff';
    ctx.fillRect(z.x-2,z.y-10,4,12);
    ctx.fillStyle='#ffffff'; ctx.fillRect(z.x-1,z.y-12,2,4);
    noGlow();
  }

  for(const e of airs){
    if(e.type==='small')drawSmall(e.x,e.y);
    else if(e.type==='mid')drawMid(e.x,e.y,e.ph);
    else drawBoss(e.x,e.y,e.ph);
  }

  for(const b of ebullets){
    glow('#ff4444',6); ctx.fillStyle='#ff6666';
    ctx.beginPath(); ctx.arc(b.x,b.y,3.5,0,Math.PI*2); ctx.fill();
    noGlow();
  }

  if(P.inv===0||frame%8<4) drawShip(P.x,P.y);

  for(const p of particles){
    ctx.globalAlpha=p.life; glow(p.col,6);
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    noGlow();
  }
  ctx.globalAlpha=1;

  for(const p of popups){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col; ctx.font='bold 12px monospace'; ctx.textAlign='center';
    ctx.fillText(p.txt,p.x,p.y);
  }
  ctx.globalAlpha=1; ctx.textAlign='left';

  // HUD
  ctx.fillStyle='#00ff88'; ctx.font='bold 13px monospace';
  ctx.fillText('SCORE '+score,8,18);
  ctx.textAlign='center'; ctx.fillText('HI '+hi,W/2,18); ctx.textAlign='left';
  for(let i=0;i<lives;i++) drawShip(W-16-i*22,14,0.75);

  ctx.restore();
}

function drawTitle(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  // star bg
  for(let i=0;i<120;i++){
    const x=(i*137.5+frame*0.4)%W, y=(i*73.1+frame*0.6)%H;
    ctx.globalAlpha=(i%3===0?0.9:0.5);
    ctx.fillStyle='#fff'; ctx.fillRect(x,y,i%4===0?2:1,i%4===0?2:1);
  }
  ctx.globalAlpha=1;
  glow('#ff44ff',18);
  ctx.fillStyle='#ff44ff'; ctx.font='bold 38px monospace'; ctx.textAlign='center';
  ctx.fillText('XEVIOUS',W/2,H/2-65);
  noGlow();
  ctx.fillStyle='#aaeeff'; ctx.font='13px monospace';
  ctx.fillText('矢印/WASD: 移動',W/2,H/2-12);
  ctx.fillText('Z/SPACE: ザッパー（空中）',W/2,H/2+11);
  ctx.fillText('X: ブラスター（地上）',W/2,H/2+34);
  ctx.fillStyle='#ffee00'; ctx.font='bold 14px monospace';
  if(Math.floor(frame/30)%2===0) ctx.fillText('TAP / SPACE TO START',W/2,H/2+70);
  ctx.textAlign='left';
}

function drawOver(){
  drawGame();
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
  glow('#ff3333',12);
  ctx.fillStyle='#ff4444'; ctx.font='bold 30px monospace'; ctx.textAlign='center';
  ctx.fillText('GAME OVER',W/2,H/2-32);
  noGlow();
  ctx.fillStyle='#ffffff'; ctx.font='14px monospace';
  ctx.fillText('SCORE: '+score,W/2,H/2+8);
  ctx.fillStyle='#ffee00';
  if(Math.floor(frame/30)%2===0) ctx.fillText('TAP / SPACE TO RETRY',W/2,H/2+46);
  ctx.textAlign='left';
}

// ── loop ──────────────────────────────────────────────────────────────────────
let gf=0;
function loop(){
  gf++;
  if(gs==='title'){frame=gf;drawTitle();}
  else if(gs==='play'){update();drawGame();}
  else{frame=++gf;drawOver();}
  requestAnimationFrame(loop);
}
mkTerrain();
loop();
</script>
